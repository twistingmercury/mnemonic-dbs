name: Mnemonic DB Images CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "src/postgres/**"
      - "src/neo4j/**"
      - ".github/workflows/mnemonic-ci.yaml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/postgres/**"
      - "src/neo4j/**"
      - ".github/workflows/mnemonic-ci.yaml"
  workflow_dispatch:

jobs:
  test-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run postgres tests
        run: make tests-postgres

  test-neo4j:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run neo4j tests
        run: make tests-neo4j

  build-and-push:
    needs: [test-postgres, test-neo4j]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build postgres image
        run: bash src/postgres/build.sh

      - name: Build neo4j image
        run: bash src/neo4j/build.sh

      - name: Push image tags
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            docker push ghcr.io/twistingmercury/mnemonic-postgres:latest
            docker push ghcr.io/twistingmercury/mnemonic-postgres:${VERSION}
            docker push ghcr.io/twistingmercury/mnemonic-neo4j:latest
            docker push ghcr.io/twistingmercury/mnemonic-neo4j:${VERSION}
          else
            docker tag ghcr.io/twistingmercury/mnemonic-postgres:latest ghcr.io/twistingmercury/mnemonic-postgres:latest-dev
            docker tag ghcr.io/twistingmercury/mnemonic-postgres:${VERSION} ghcr.io/twistingmercury/mnemonic-postgres:${VERSION}-dev
            docker push ghcr.io/twistingmercury/mnemonic-postgres:latest-dev
            docker push ghcr.io/twistingmercury/mnemonic-postgres:${VERSION}-dev
            docker tag ghcr.io/twistingmercury/mnemonic-neo4j:latest ghcr.io/twistingmercury/mnemonic-neo4j:latest-dev
            docker tag ghcr.io/twistingmercury/mnemonic-neo4j:${VERSION} ghcr.io/twistingmercury/mnemonic-neo4j:${VERSION}-dev
            docker push ghcr.io/twistingmercury/mnemonic-neo4j:latest-dev
            docker push ghcr.io/twistingmercury/mnemonic-neo4j:${VERSION}-dev
          fi
